<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS-Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="main animate-fade-in margin_box">
      <div class="header_nav">
        <a href="orders.html" class="category_left_head">
          <img src="../assets/image/icons/leftArrow.svg" alt="" />
          <h4>OrdersDetail</h4>
        </a>
      </div>
      <div class="order_detail_wrap">
        <div class="order_deliver_status">
            <div class="icon_status">
                <img src="../assets/image/icons/box.svg" alt="">
            </div>
            <h5>Your order is : <b>Deliverd</b></h5>
        </div>
        <div class="orderDetailData" id="orderDetailData"></div>
         <div class="order_data_item">
          <div class="order_top_wrap">
            <div class="order_item_img">
              <img
              id="shopImg"
                src=""
                alt=""
              />
            </div>
            <div class="order_item_txt">
                <h4 id="shopName"></h4>
                <p id="shopAddress">Ratu Road, Ranchi</p>
            </div>
          </div>
          <div class="order_middle_wrap" id="prdData">
           
          </div>
        
        </div>
          <div class="cart_data_sec4 order_Detail_bill">
          <div class="bill_wrapper">
            <div class="flex_header">
              <h4>Bill details</h4>
              
            </div>

            <div class="bill_format_data">
              <div class="bill_field">
                <div class="left_bill_field">
                  <i class="bi bi-card-text"></i>
                  <p>Sub Total</p>
                </div>
                <div class="right_bill_field">
                  <small>₹1200</small>
                </div>
              </div>
              <div class="bill_field green">
                <div class="left_bill_field">
                  <i class="bi bi-tags-fill"></i>
                  <p>Product Discount</p>
                </div>
                <div class="right_bill_field">
                  <small>-₹1200</small>
                </div>
              </div>
              <div class="bill_field green">
                <div class="left_bill_field">
                  <img src="../assets/image/icons/coupons2.svg" alt="" />
                  <p>Promo Discount</p>
                </div>
                <div class="right_bill_field">
                  <small>-₹1200</small>
                </div>
              </div>
              <div class="bill_field">
                <div class="left_bill_field">
                  <img
                    style="width: 15px"
                    src="../assets/image/icons/delivery.png"
                    alt=""
                  />
                  <p>Delivery Charge</p>
                </div>
                <div class="right_bill_field">
                  <small>₹1200</small>
                </div>
              </div>
              <div class="bill_field">
                <div class="left_bill_field">
                  <i class="bi bi-handbag-fill"></i>
                  <p>Handling Charge</p>
                </div>
                <div class="right_bill_field">
                  <small>₹1200</small>
                </div>
              </div>
              <div class="img-design"></div>
              <div class="bill_field bill_total">
                <div class="left_bill_field">
                  <p>Grand Total</p>
                </div>
                <div class="right_bill_field">
                  <small>₹4200</small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../assets/js/owl.carousel.min.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        getOrderDetail();
    </script>
  </body>
</html>
