<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS-Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="main animate-fade-in">
      <div class="otp_form">
        <div class="reset_header reuse_header">
          <a href="forgotOtp.html" class="icon">
            <i class="bi bi-chevron-left"></i>
          </a>
          <h4>Reset Password</h4>
          <div></div>
        </div>

        <form
          onsubmit="
            handleUpdatePassword(event);
            return false;
          "
          class="reset_password wrapper"
        >
          <div class="reset_password_head reuse_head">
            <h4>Reset Password</h4>
            <p>
              Your new password must be different from the previously used
              password
            </p>
          </div>
          <div class="reset_password_form_wrap">
            <div class="form_inp">
              <label for="password">New Password</label>
              <div class="inp">
                <input type="text" id="updatePassword" placeholder="Password" />
                <i id="eye1" onclick="handleToggle('eye1','updatePassword' )" class="bi bi-eye"></i>
              </div>
            </div>
            <small>Must be at least 8 character</small>
            <div class="form_inp">
              <label for="password">Confirm Password</label>
              <div class="inp">
                <input
                  type="text"
                  id="reUpdatePassword"
                  placeholder="Password"
                />
                <i id="eye2" onclick="handleToggle('eye2','reUpdatePassword')" class="bi bi-eye"></i>
              </div>
            </div>
            <small>Both password must match</small>
            <div class="reset_btn reuse_btn">
              <button id="btnReset" type="submit">Verify Account</button>
            </div>
          </div>
        </form>
      </div>
    </div>


    <div
      class="offcanvas offcanvas-bottom password_canvas"
      tabindex="-1"
      id="offcanvasPassword"
      aria-labelledby="offcanvasPasswordLabel"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
    >
      <div class="offcanvas-body small password_body">
        <img src="../assets/image/icons/gif1.svg" alt="" />
         <h4>Password Changed</h4>
      <p>
        Password changed successfully, you can login again with a new password
      </p>
      <div class="reset_btn reset_password_btn reuse_btn">
        <button onclick="location.href='login.html'" type="submit">Click here to login</button>
      </div>
      </div>
     
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="../assets/js/script.js"></script>
  </body>
</html>
