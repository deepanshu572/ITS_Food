<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS-Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="main animate-fade-in margin_box">
      <div class="header_nav">
        <a href="home.html" class="category_left_head">
          <img src="../assets/image/icons/leftArrow.svg" alt="" />
          <h4>Orders</h4>
        </a>
      </div>
      <div class="order_data_wrapper" id="ordersData">
        <div class="order_data_item">
          <div class="order_top_wrap">
            <div class="order_item_img">
              <img
                src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500"
                alt=""
              />
            </div>
            <div class="order_item_txt">
                <h4>Food Bazaar Rajdhani</h4>
                <p>Ratu Road, Ranchi</p>
            </div>
          </div>
          <div class="order_middle_wrap">
            <div class="order_middle_box">
                <img src="../assets/image/icons/failed.svg" alt="">
                <p>Chicken Biryani</p>
            </div>
            <div class="order_middle_box">
                <img src="../assets/image/icons/success.svg" alt="">
                <p>Veg Biryani</p>
            </div>
          </div>
          <div class="order_bottom_wrap">
            <div class="order_bottom_top">
                <h5>Order placed on <b> 09 Jul 2025,</b> 2:26PM</h5>
                <p>Total Bill <b>₹148.16</b></p>
            </div>
            <div class="order_bottom_bottom status">
                <h5>Delivered </h5>
                <a href="">View Detail</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
