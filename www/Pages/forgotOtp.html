<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS-Food</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="main animate-fade-in">
      <div class="otp_form">
        <div class="otp_header reuse_header">
          <a href="login.html" class="icon">
            <i class="bi bi-chevron-left"></i>
          </a>
          <h4>OTP</h4>
          <div></div>
        </div>
        <form
          onsubmit="
            handleVerifyOtp(event);
            return false;
          "
          class="form_otp_data wrapper"
        >
          <div class="form_otp_head reuse_head">
            <h4>Email Verification</h4>
            <p>
              Enter the verification code we send you on:
              <a href=""> dbi****@gmail.com</a>
            </p>
          </div>

          <div class="form_otp_inputs">
            <h5>Enter OTP</h5>
            <div class="form_otp_input">
              <div class="form_inp_otp_holder">
                <input class="otp_input_verify" id="otp1" type="number" required />
              </div>
              <div class="form_inp_otp_holder">
                <input class="otp_input_verify" id="otp2" type="number" required />
              </div>
              <div class="form_inp_otp_holder">
                <input class="otp_input_verify" id="otp3" type="number" required />
              </div>
              <div class="form_inp_otp_holder">
                <input class="otp_input_verify" id="otp4" type="number" required />
              </div>
              <div class="form_inp_otp_holder">
                <input class="otp_input_verify" id="otp5" type="number" required />
              </div>
              <div class="form_inp_otp_holder">
                <input class="otp_input_verify" id="otp6" type="number" required />
              </div>
            </div>
            <p>Didn’t receive code? <b onclick="handleReSendOtp();"> Resend </b></p>

            <div class="form_otp_btn reuse_btn">
              <button id="verifyOtpBtn">Verify Otp</button>
            </div>
            <h6><i class="bi bi-stopwatch"></i> 00:26</h6>
          </div>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      $(".otp_input").on("input", function () {
        if ($(this).val().length === 1) {
          $(this).next(".otp_input").focus();
        }
      });
      $(".otp_input").on("keydown", function (e) {
        if (e.key === "Backspace" && $(this).val() === "") {
          $(this).prev(".otp_input").focus();
        }
      });
    </script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
